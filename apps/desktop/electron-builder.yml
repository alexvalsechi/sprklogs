appId: com.sparklogs.analyzer.desktop
productName: SprkLogs
electronVersion: 31.7.7
directories:
  output: dist
npmRebuild: false
nodeGypRebuild: false
files:
  - dist/**/*
  - renderer/**/*
  - resources/**/*
  - package.json
  - electron-builder.yml
extraResources:
  - from: resources/backend
    to: backend
    filter:
      - "**/*"
win:
  icon: renderer/features/spark-analyzer/favicon.ico
  target:
    - target: nsis
      arch:
        - x64
nsis:
  artifactName: SprkLogs-setup-v${version}.${ext}
  installerIcon: renderer/features/spark-analyzer/favicon.ico
  uninstallerIcon: renderer/features/spark-analyzer/favicon.ico
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
