appId: com.sparklogs.analyzer.desktop
productName: Spark Log Analyzer
electronVersion: 31.7.7
directories:
  output: dist
npmRebuild: false
nodeGypRebuild: false
files:
  - dist/**/*
  - renderer/**/*
  - resources/**/*
  - package.json
  - electron-builder.yml
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
