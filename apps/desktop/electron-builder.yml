appId: com.sparklogs.analyzer.desktop
productName: SprkLogs
electronVersion: 31.7.7
extraMetadata:
  name: sprklogs
directories:
  output: dist
npmRebuild: false
nodeGypRebuild: false
files:
  - dist/**/*
  - renderer/**/*
  - resources/**/*
  - package.json
  - electron-builder.yml
extraResources:
  - from: resources/backend
    to: backend
    filter:
      - "**/*"
  - from: ../../backend
    to: backend
    filter:
      - "**/*.py"
      - "!__pycache__/**"
      - "!tests/**"
      - "!.pytest_cache/**"
  - from: main/scripts
    to: scripts
    filter:
      - "*.py"
win:
  icon: renderer/features/spark-analyzer/web-app-manifest-512x512.png
  target:
    - target: nsis
      arch:
        - x64
nsis:
  artifactName: SprkLogs-setup-v${version}.${ext}
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
