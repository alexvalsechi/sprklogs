name: Build Python backend

on:
  push:
    paths:
      - 'backend/**'
      - 'infra/scripts/build-python.sh'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build binary
        run: bash infra/scripts/build-python.sh

      - uses: actions/upload-artifact@v4
        with:
          name: python-bin-${{ runner.os }}
          path: apps/desktop/resources/backend/
          retention-days: 7
