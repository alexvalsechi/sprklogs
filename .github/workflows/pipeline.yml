              '"use strict";'
              'Object.defineProperty(exports, "__esModule", { value: true });'
              'exports.getPath7x = exports.getPath7za = void 0;'
              'const _7zip_bin_1 = require("7zip-bin");'
              'const fs = require("fs");'
              'const fs_extra_1 = require("fs-extra");'
              'async function getPath7za() {'
              '    if (fs.existsSync(_7zip_bin_1.path7za)) {'
              '        await (0, fs_extra_1.chmod)(_7zip_bin_1.path7za, 0o755);'
              '    }'
              '    return _7zip_bin_1.path7za;'
              '}'
              'exports.getPath7za = getPath7za;'
              'async function getPath7x() {'
              '    if (fs.existsSync(_7zip_bin_1.path7x)) {'
              '        await (0, fs_extra_1.chmod)(_7zip_bin_1.path7x, 0o755);'
              '    }'
              '    return _7zip_bin_1.path7x;'
              '}'
              'exports.getPath7x = getPath7x;'
            ) -join "`n"
            Set-Content -Path $builder7za -Value $patchedBuilder7za -Encoding utf8 -Force
          }

          Write-Output "Resolved paths:"
          node -e "const fs=require('fs');const p7='node_modules/7zip-bin/win/x64/7za.exe';const pab='node_modules/app-builder-bin/win/x64/app-builder.exe';console.log('7za path:',p7,'exists:',fs.existsSync(p7));console.log('app-builder path:',pab,'exists:',fs.existsSync(pab));"

      - name: Build NSIS installer
        run: npm run dist:win --workspace @log-sparkui/desktop

      - name: Validate packaged backend is binary-only
        shell: powershell
        run: |
          $sourceFiles = Get-ChildItem -Path apps/desktop/dist/win-unpacked/resources/backend -Recurse -Include *.py -ErrorAction SilentlyContinue
          if ($sourceFiles) {
            $listed = ($sourceFiles | ForEach-Object { $_.FullName }) -join "`n"
            Write-Error "Packaged backend contains Python source files:`n$listed"
            exit 1
          }

      - name: Generate SHA256 checksums
        shell: powershell
        run: |
          $checksums = ""
          Get-ChildItem -Path apps/desktop/dist -Filter *.exe -Recurse | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            $checksums += "$($hash.Hash)  $($_.Name)`n"
          }
          Set-Content -Path apps/desktop/dist/checksums.txt -Value $checksums

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@b25b93d384199fc0fc8c2e126b2d937a0cbeb2ae
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.release_tag }}
          target_commitish: ${{ github.event_name == 'release' && github.sha || github.event.inputs.source_ref }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/checksums.txt
