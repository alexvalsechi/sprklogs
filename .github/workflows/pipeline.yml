name: Monorepo CI-CD

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
    paths:
      - '**'
      - '!**/*.md'
      - 'apps/desktop/**/*.md'
      - '!docs/**'
      - '!.env.example'
      - '!.gitignore'
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_as:
        description: "Optional forced version for release-please PR (example: 0.2.4)"
        required: false
        type: string
      source_ref:
        description: "Git ref used for manual build/publish (branch, tag or SHA). Default: master"
        required: false
        default: "master"
        type: string
      release_tag:
        description: "Optional version tag to publish assets into (example: v0.2.4)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: monorepo-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.filter.outputs.backend }}
      desktop_runtime_changed: ${{ steps.filter.outputs.desktop_runtime }}
      desktop_docs_release_changed: ${{ steps.filter.outputs.desktop_docs_release }}
      desktop_release_needed: ${{ steps.release_scope.outputs.desktop_release_needed }}
      release_please_branch: ${{ steps.branch.outputs.is_release_please_branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Compute PR branch class
        id: branch
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.head_ref }}" == release-please--* ]]; then
            echo "is_release_please_branch=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release_please_branch=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect backend changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'infra/scripts/build-python.sh'
              - 'infra/scripts/build-python.ps1'
            desktop_runtime:
              - 'apps/desktop/**'
              - '!apps/desktop/**/*.md'
              - 'backend/**'
              - 'packages/ipc-types/**'
              - 'packages/ui/**'
              - 'package.json'
              - 'package-lock.json'
              - 'infra/scripts/build-python.sh'
              - 'infra/scripts/build-python.ps1'
            desktop_docs_release:
              - 'apps/desktop/**/*.md'

      - name: Compute desktop release scope
        id: release_scope
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "push" ]]; then
            echo "desktop_release_needed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"

          if [[ -z "$BEFORE_SHA" || "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            BEFORE_SHA="$(git rev-parse "${AFTER_SHA}^" 2>/dev/null || true)"
          fi

          if [[ -z "$BEFORE_SHA" ]]; then
            echo "desktop_release_needed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          desktop_release_needed=false
          while IFS= read -r changed_file; do
            [[ -z "$changed_file" ]] && continue
            case "$changed_file" in
              apps/desktop/*|backend/*|packages/ipc-types/*|packages/ui/*|infra/scripts/build-python.sh|infra/scripts/build-python.ps1|package.json|package-lock.json)
                desktop_release_needed=true
                break
                ;;
            esac
          done < <(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA")

          echo "desktop_release_needed=$desktop_release_needed" >> "$GITHUB_OUTPUT"

  backend-tests:
    name: Backend tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend test suite
        run: pytest tests -q

  desktop-check:
    name: Desktop integrity check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install desktop dependencies
        run: npm ci

      - name: Validate desktop package
        run: npm run check

  frontend-static-check:
    name: Frontend static check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Validate institutional pages
        run: |
          test -f apps/web/index.html

      - name: Smoke check desktop download CTAs
        run: |
          grep -q 'id="nav-download-exe"' apps/web/index.html
          grep -q 'id="cta-download-exe"' apps/web/index.html
          grep -q 'hydrateExeLinks' apps/web/index.html

  release-please:
    name: Release Please
    needs: detect-changes
    if: ((github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) && needs.detect-changes.outputs.desktop_release_needed == 'true') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_as != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Determine release strategy
        id: release_meta
        shell: bash
        run: |
          MANUAL_RELEASE_AS="${{ github.event.inputs.release_as }}"
          if [[ -n "$MANUAL_RELEASE_AS" ]]; then
            echo "release_as=$MANUAL_RELEASE_AS" >> "$GITHUB_OUTPUT"
            echo "mode=manual" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ needs.detect-changes.outputs.desktop_docs_release_changed }}" == "true" && "${{ needs.detect-changes.outputs.desktop_runtime_changed }}" != "true" ]]; then
            NEXT_PATCH=$(node -e "const fs=require('fs'); const manifest=JSON.parse(fs.readFileSync('.release-please-manifest.json','utf8')); const current=manifest['.']; if (!current) throw new Error('Missing root version in .release-please-manifest.json'); const parts=current.split('.').map(Number); if (parts.length !== 3 || parts.some(Number.isNaN)) throw new Error('Invalid semver: ' + current); parts[2] += 1; process.stdout.write(parts.join('.'));")
            echo "release_as=$NEXT_PATCH" >> "$GITHUB_OUTPUT"
            echo "mode=desktop-docs-patch" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "release_as=" >> "$GITHUB_OUTPUT"
          echo "mode=conventional" >> "$GITHUB_OUTPUT"

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          release-as: ${{ steps.release_meta.outputs.release_as }}

  build-desktop-versioned-release:
    name: Build and publish versioned desktop release
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Sync desktop version with tag
        shell: bash
        run: |
          TAG_NAME="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${TAG_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --workspace @log-sparkui/desktop

      - name: Install dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Build Python backend executable
        shell: powershell
        run: ./infra/scripts/build-python.ps1

      - name: Validate backend executable presence
        shell: powershell
        run: |
          if (-not (Test-Path "apps/desktop/resources/backend/server.exe")) {
            Write-Error "Missing apps/desktop/resources/backend/server.exe"; exit 1
          }

      - name: Ensure electron-builder native binaries
        shell: powershell
        run: |
          function Ensure-FromNpmTarball {
            param(
              [string]$PackageName,
              [string]$Version,
              [string]$FileInTar,
              [string]$Destination
            )

            if (Test-Path $Destination) {
              Write-Output "OK: already exists $Destination"
              return
            }

            $tgz = "$PackageName-$Version.tgz"
            Write-Output "Downloading $PackageName@$Version via npm pack..."
            npm pack "$PackageName@$Version"

            if (-not (Test-Path $tgz)) {
              throw "Failed to download $tgz"
            }

            tar -xzf $tgz "$FileInTar"
            if (-not (Test-Path ($FileInTar -replace '^package/', 'package\\'))) {
              throw "Failed to extract $FileInTar from $tgz"
            }

            New-Item -ItemType Directory -Path (Split-Path $Destination -Parent) -Force | Out-Null
            Copy-Item ($FileInTar -replace '^package/', 'package\\') $Destination -Force

            Remove-Item $tgz -Force -ErrorAction SilentlyContinue
            Remove-Item package -Recurse -Force -ErrorAction SilentlyContinue
            Write-Output "OK: restored $Destination"
          }

          Ensure-FromNpmTarball -PackageName "7zip-bin" -Version "5.2.0" -FileInTar "package/win/x64/7za.exe" -Destination "node_modules/7zip-bin/win/x64/7za.exe"
          Ensure-FromNpmTarball -PackageName "app-builder-bin" -Version "4.0.0" -FileInTar "package/win/x64/app-builder.exe" -Destination "node_modules/app-builder-bin/win/x64/app-builder.exe"

          # Patch 7zip-bin so missing bundled binary falls back to system 7z
          $sevenZipIndex = "node_modules/7zip-bin/index.js"
          if (Test-Path $sevenZipIndex) {
            $indexContent = @(
              '"use strict"'
              'const path = require("path")'
              'const fs = require("fs")'
              ''
              'function getPath() {'
              '  if (process.platform === "darwin") {'
              '    const p = path.join(__dirname, "mac", process.arch, "7za")'
              '    return fs.existsSync(p) ? p : "7za"'
              '  }'
              '  if (process.platform === "win32") {'
              '    const bundled = path.join(__dirname, "win", process.arch, "7za.exe")'
              '    if (fs.existsSync(bundled)) {'
              '      return bundled'
              '    }'
              '    const system7z = "C:\\Program Files\\7-Zip\\7z.exe"'
              '    return fs.existsSync(system7z) ? system7z : bundled'
              '  }'
              '  const p = path.join(__dirname, "linux", process.arch, "7za")'
              '  return fs.existsSync(p) ? p : "7za"'
              '}'
              ''
              'exports.path7za = getPath()'
              'exports.path7x = path.join(__dirname, "7x.sh")'
            ) -join "`n"
            Set-Content -Path $sevenZipIndex -Value $indexContent -Encoding utf8 -Force
          }

          # Patch builder-util chmod guard
          $builder7za = "node_modules/builder-util/out/7za.js"
          if (Test-Path $builder7za) {
            $patchedBuilder7za = @(
              '"use strict";'
              'Object.defineProperty(exports, "__esModule", { value: true });'
              'exports.getPath7x = exports.getPath7za = void 0;'
              'const _7zip_bin_1 = require("7zip-bin");'
              'const fs = require("fs");'
              'const fs_extra_1 = require("fs-extra");'
              'async function getPath7za() {'
              '    if (fs.existsSync(_7zip_bin_1.path7za)) {'
              '        await (0, fs_extra_1.chmod)(_7zip_bin_1.path7za, 0o755);'
              '    }'
              '    return _7zip_bin_1.path7za;'
              '}'
              'exports.getPath7za = getPath7za;'
              'async function getPath7x() {'
              '    if (fs.existsSync(_7zip_bin_1.path7x)) {'
              '        await (0, fs_extra_1.chmod)(_7zip_bin_1.path7x, 0o755);'
              '    }'
              '    return _7zip_bin_1.path7x;'
              '}'
              'exports.getPath7x = getPath7x;'
            ) -join "`n"
            Set-Content -Path $builder7za -Value $patchedBuilder7za -Encoding utf8 -Force
          }

          Write-Output "Resolved paths:"
          node -e "const fs=require('fs');const p7='node_modules/7zip-bin/win/x64/7za.exe';const pab='node_modules/app-builder-bin/win/x64/app-builder.exe';console.log('7za path:',p7,'exists:',fs.existsSync(p7));console.log('app-builder path:',pab,'exists:',fs.existsSync(pab));"

      - name: Build NSIS installer
        run: npm run dist:win --workspace @log-sparkui/desktop

      - name: Validate packaged backend is binary-only
        shell: powershell
        run: |
          $sourceFiles = Get-ChildItem -Path apps/desktop/dist/win-unpacked/resources/backend -Recurse -Include *.py -ErrorAction SilentlyContinue
          if ($sourceFiles) {
            $listed = ($sourceFiles | ForEach-Object { $_.FullName }) -join "`n"
            Write-Error "Packaged backend contains Python source files:`n$listed"
            exit 1
          }

      - name: Generate SHA256 checksums
        shell: powershell
        run: |
          $checksums = ""
          Get-ChildItem -Path apps/desktop/dist -Filter *.exe -Recurse | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            $checksums += "$($hash.Hash)  $($_.Name)`n"
          }
          Set-Content -Path apps/desktop/dist/checksums.txt -Value $checksums

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@b25b93d384199fc0fc8c2e126b2d937a0cbeb2ae
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          generate_release_notes: false
          fail_on_unmatched_files: true
          files: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/checksums.txt

  build-python:
    name: Build Python backend (${{ matrix.os }})
    if: github.event_name == 'push' && needs.detect-changes.outputs.backend_changed == 'true'
    needs: detect-changes
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build binary
        run: bash infra/scripts/build-python.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-bin-${{ runner.os }}
          path: apps/desktop/resources/backend/
          retention-days: 7

  build-desktop-master-latest:
    name: Build desktop master latest
    needs: detect-changes
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && needs.detect-changes.outputs.desktop_release_needed == 'true'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Build Python backend executable
        shell: powershell
        run: ./infra/scripts/build-python.ps1

      - name: Validate backend executable presence
        shell: powershell
        run: |
          if (-not (Test-Path "apps/desktop/resources/backend/server.exe")) {
            Write-Error "Missing apps/desktop/resources/backend/server.exe"; exit 1
          }

      - name: Ensure electron-builder native binaries
        shell: powershell
        run: |
          function Ensure-FromNpmTarball {
            param(
              [string]$PackageName,
              [string]$Version,
              [string]$FileInTar,
              [string]$Destination
            )

            if (Test-Path $Destination) {
              Write-Output "OK: already exists $Destination"
              return
            }

            $tgz = "$PackageName-$Version.tgz"
            Write-Output "Downloading $PackageName@$Version via npm pack..."
            npm pack "$PackageName@$Version"

            if (-not (Test-Path $tgz)) {
              throw "Failed to download $tgz"
            }

            tar -xzf $tgz "$FileInTar"
            if (-not (Test-Path ($FileInTar -replace '^package/', 'package\\'))) {
              throw "Failed to extract $FileInTar from $tgz"
            }

            New-Item -ItemType Directory -Path (Split-Path $Destination -Parent) -Force | Out-Null
            Copy-Item ($FileInTar -replace '^package/', 'package\\') $Destination -Force

            Remove-Item $tgz -Force -ErrorAction SilentlyContinue
            Remove-Item package -Recurse -Force -ErrorAction SilentlyContinue
            Write-Output "OK: restored $Destination"
          }

          Ensure-FromNpmTarball -PackageName "7zip-bin" -Version "5.2.0" -FileInTar "package/win/x64/7za.exe" -Destination "node_modules/7zip-bin/win/x64/7za.exe"
          Ensure-FromNpmTarball -PackageName "app-builder-bin" -Version "4.0.0" -FileInTar "package/win/x64/app-builder.exe" -Destination "node_modules/app-builder-bin/win/x64/app-builder.exe"

          # Patch 7zip-bin so missing bundled binary falls back to system 7z
          $sevenZipIndex = "node_modules/7zip-bin/index.js"
          if (Test-Path $sevenZipIndex) {
            $indexContent = @(
              '"use strict"'
              'const path = require("path")'
              'const fs = require("fs")'
              ''
              'function getPath() {'
              '  if (process.platform === "darwin") {'
              '    const p = path.join(__dirname, "mac", process.arch, "7za")'
              '    return fs.existsSync(p) ? p : "7za"'
              '  }'
              '  if (process.platform === "win32") {'
              '    const bundled = path.join(__dirname, "win", process.arch, "7za.exe")'
              '    if (fs.existsSync(bundled)) {'
              '      return bundled'
              '    }'
              '    const system7z = "C:\\Program Files\\7-Zip\\7z.exe"'
              '    return fs.existsSync(system7z) ? system7z : bundled'
              '  }'
              '  const p = path.join(__dirname, "linux", process.arch, "7za")'
              '  return fs.existsSync(p) ? p : "7za"'
              '}'
              ''
              'exports.path7za = getPath()'
              'exports.path7x = path.join(__dirname, "7x.sh")'
            ) -join "`n"
            Set-Content -Path $sevenZipIndex -Value $indexContent -Encoding utf8 -Force
          }

          # Patch builder-util chmod guard (same idea as electron-builder fix in newer builds)
          $builder7za = "node_modules/builder-util/out/7za.js"
          if (Test-Path $builder7za) {
            $patchedBuilder7za = @(
              '"use strict";'
              'Object.defineProperty(exports, "__esModule", { value: true });'
              'exports.getPath7x = exports.getPath7za = void 0;'
              'const _7zip_bin_1 = require("7zip-bin");'
              'const fs = require("fs");'
              'const fs_extra_1 = require("fs-extra");'
              'async function getPath7za() {'
              '    if (fs.existsSync(_7zip_bin_1.path7za)) {'
              '        await (0, fs_extra_1.chmod)(_7zip_bin_1.path7za, 0o755);'
              '    }'
              '    return _7zip_bin_1.path7za;'
              '}'
              'exports.getPath7za = getPath7za;'
              'async function getPath7x() {'
              '    if (fs.existsSync(_7zip_bin_1.path7x)) {'
              '        await (0, fs_extra_1.chmod)(_7zip_bin_1.path7x, 0o755);'
              '    }'
              '    return _7zip_bin_1.path7x;'
              '}'
              'exports.getPath7x = getPath7x;'
            ) -join "`n"
            Set-Content -Path $builder7za -Value $patchedBuilder7za -Encoding utf8 -Force
          }

          Write-Output "Resolved paths:"
          node -e "const fs=require('fs');const p7='node_modules/7zip-bin/win/x64/7za.exe';const pab='node_modules/app-builder-bin/win/x64/app-builder.exe';console.log('7za path:',p7,'exists:',fs.existsSync(p7));console.log('app-builder path:',pab,'exists:',fs.existsSync(pab));"

      - name: Build NSIS installer
        run: npm run dist:win --workspace @log-sparkui/desktop

      - name: Validate packaged backend is binary-only
        shell: powershell
        run: |
          $sourceFiles = Get-ChildItem -Path apps/desktop/dist/win-unpacked/resources/backend -Recurse -Include *.py -ErrorAction SilentlyContinue
          if ($sourceFiles) {
            $listed = ($sourceFiles | ForEach-Object { $_.FullName }) -join "`n"
            Write-Error "Packaged backend contains Python source files:`n$listed"
            exit 1
          }

      - name: Generate SHA256 checksums
        shell: powershell
        run: |
          $checksums = ""
          Get-ChildItem -Path apps/desktop/dist -Filter *.exe -Recurse | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            $checksums += "$($hash.Hash)  $($_.Name)`n"
          }
          Set-Content -Path apps/desktop/dist/checksums.txt -Value $checksums

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: desktop-master-latest
          path: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/checksums.txt

      - name: Publish rolling master release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd
        with:
          tag: master-latest
          name: Desktop build (master latest)
          body: |
            Latest Windows installer generated from master/main.
          prerelease: true
          allowUpdates: true
          replacesArtifacts: true
          artifacts: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/checksums.txt

  build-desktop-release-please-preview:
    name: Build desktop preview (release-please PR)
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.release_please_branch == 'true'
    needs: detect-changes
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Build Python backend executable
        shell: powershell
        run: ./infra/scripts/build-python.ps1

      - name: Ensure electron-builder native binaries
        shell: powershell
        run: |
          function Ensure-FromNpmTarball {
            param(
              [string]$PackageName,
              [string]$Version,
              [string]$FileInTar,
              [string]$Destination
            )

            if (Test-Path $Destination) {
              Write-Output "OK: already exists $Destination"
              return
            }

            $tgz = "$PackageName-$Version.tgz"
            Write-Output "Downloading $PackageName@$Version via npm pack..."
            npm pack "$PackageName@$Version"

            if (-not (Test-Path $tgz)) {
              throw "Failed to download $tgz"
            }

            tar -xzf $tgz "$FileInTar"
            if (-not (Test-Path ($FileInTar -replace '^package/', 'package\\'))) {
