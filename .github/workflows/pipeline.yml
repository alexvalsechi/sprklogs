              '"use strict"'
              'const path = require("path")'
              'const fs = require("fs")'
              ''
              'function getPath() {'
              '  if (process.platform === "darwin") {'
              '    const p = path.join(__dirname, "mac", process.arch, "7za")'
              '    return fs.existsSync(p) ? p : "7za"'
              '  }'
              '  if (process.platform === "win32") {'
