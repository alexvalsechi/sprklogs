      - name: Upload PR preview artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: desktop-release-please-preview
          path: apps/desktop/dist/*.exe
          retention-days: 7

  build-pages:
    name: Build Pages artifact
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b
        with:
          enablement: true

      - name: Prepare static site
        run: |
          rm -rf _site
          mkdir -p _site
          cp -R apps/web/. _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: _site

  deploy-pages:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: build-pages
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e

  publish-versioned-assets:
    name: Publish versioned desktop assets
    if: (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v')) || (github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.release_tag, 'v'))
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          # In manual runs, the tag may not exist yet. Build from source_ref and
          # publish artifacts into the requested release_tag.
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.source_ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Sync desktop version with tag
        shell: bash
        run: |
          TAG_NAME="${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.release_tag }}"
          VERSION="${TAG_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --workspace @log-sparkui/desktop

      - name: Install dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Build Python backend executable
        shell: powershell
        run: ./infra/scripts/build-python.ps1

      - name: Ensure electron-builder native binaries
        shell: powershell
        run: |
          function Ensure-FromNpmTarball {
            param(
              [string]$PackageName,
              [string]$Version,
              [string]$FileInTar,
              [string]$Destination
            )

            if (Test-Path $Destination) {
              Write-Output "OK: already exists $Destination"
              return
            }

            $tgz = "$PackageName-$Version.tgz"
            Write-Output "Downloading $PackageName@$Version via npm pack..."
            npm pack "$PackageName@$Version"

            if (-not (Test-Path $tgz)) {
              throw "Failed to download $tgz"
            }

            tar -xzf $tgz "$FileInTar"
            if (-not (Test-Path ($FileInTar -replace '^package/', 'package\\'))) {
