name: CI

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend test suite
        run: pytest tests -q

  desktop-check:
    name: Desktop integrity check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install desktop dependencies
        run: npm ci

      - name: Validate desktop package
        run: npm run check

  frontend-static-check:
    name: Frontend static check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Validate institutional pages
        run: |
          test -f apps/web/index.html
          test -f apps/web/sprklogs-landing.html

      - name: Smoke check desktop download CTAs
        run: |
          grep -q 'id="desktop-download-link"' apps/web/index.html
          grep -q 'hydrateDesktopDownloadLink' apps/web/index.html
          grep -q 'id="nav-download-exe"' apps/web/sprklogs-landing.html
          grep -q 'id="cta-download-exe"' apps/web/sprklogs-landing.html
          grep -q 'hydrateExeLinks' apps/web/sprklogs-landing.html
