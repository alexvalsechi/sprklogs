name: Release Desktop EXE

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-exe:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Sync desktop version with release tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            npm version "$VERSION" --no-git-tag-version --workspace @log-sparkui/desktop
          fi

      - name: Install dependencies
        run: npm ci

      - name: Fix 7zip-bin for electron-builder
        shell: powershell
        run: |
          # Patch builder-util's 7za.js to guard chmod with existsSync
          # and patch 7zip-bin/index.js to use system 7z.exe as fallback
          # Ref: https://github.com/electron-userland/electron-builder/issues/8021

          $system7z = "C:\Program Files\7-Zip\7z.exe"
          Write-Output "System 7z exists: $(Test-Path $system7z)"

          # 1) Patch 7zip-bin/index.js to return system 7z path on Windows
          $sevenBinIndex = "node_modules/7zip-bin/index.js"
          $patchedIndex = @'
          "use strict"
          const path = require("path")
          const fs = require("fs")
          function getPath() {
            const bundled = (process.platform === "win32")
              ? path.join(__dirname, "win", process.arch, "7za.exe")
              : (process.platform === "darwin")
                ? path.join(__dirname, "mac", process.arch, "7za")
                : path.join(__dirname, "linux", process.arch, "7za")
            if (fs.existsSync(bundled)) return bundled
            if (process.platform === "win32") {
              const sys = "C:\\Program Files\\7-Zip\\7z.exe"
              if (fs.existsSync(sys)) return sys
            }
            return bundled
          }
          exports.path7za = getPath()
          exports.path7x = path.join(__dirname, "7x.sh")
          '@
          Set-Content -Path $sevenBinIndex -Value $patchedIndex -Encoding utf8 -Force

          # 2) Patch builder-util/out/7za.js to guard chmod with existsSync
          $builderUtil7za = "node_modules/builder-util/out/7za.js"
          $patchedUtil = @'
          "use strict";
          Object.defineProperty(exports, "__esModule", { value: true });
          exports.getPath7x = exports.getPath7za = void 0;
          const _7zip_bin_1 = require("7zip-bin");
          const fs = require("fs");
          const fs_extra_1 = require("fs-extra");
          async function getPath7za() {
            if (fs.existsSync(_7zip_bin_1.path7za)) {
              await (0, fs_extra_1.chmod)(_7zip_bin_1.path7za, 0o755);
            }
            return _7zip_bin_1.path7za;
          }
          exports.getPath7za = getPath7za;
          async function getPath7x() {
            if (fs.existsSync(_7zip_bin_1.path7x)) {
              await (0, fs_extra_1.chmod)(_7zip_bin_1.path7x, 0o755);
            }
            return _7zip_bin_1.path7x;
          }
          exports.getPath7x = getPath7x;
          '@
          Set-Content -Path $builderUtil7za -Value $patchedUtil -Encoding utf8 -Force

          # 3) Verify
          Write-Output "--- Patched 7zip-bin/index.js ---"
          node -e "const b = require('7zip-bin'); console.log('path7za:', b.path7za); console.log('exists:', require('fs').existsSync(b.path7za))"
          Write-Output "--- Patched builder-util/out/7za.js ---"
          node -e "const b = require('builder-util/out/7za'); b.getPath7za().then(p => console.log('getPath7za():', p))"

      - name: Build NSIS installer
        run: npm run dist:win --workspace @log-sparkui/desktop

      - name: Generate SHA256 checksums
        shell: powershell
        run: |
          $checksums = ""
          Get-ChildItem -Path apps/desktop/dist -Filter *.exe -Recurse | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            $checksums += "$($hash.Hash)  $($_.Name)`n"
          }
          Set-Content -Path apps/desktop/dist/checksums.txt -Value $checksums

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: desktop-windows-installer
          path: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/checksums.txt

      - name: Publish rolling master release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd
        with:
          tag: master-latest
          name: Desktop build (master latest)
          body: |
            Latest Windows installer generated from master/main.
          prerelease: true
          allowUpdates: true
          replacesArtifacts: true
          artifacts: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/checksums.txt

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@b25b93d384199fc0fc8c2e126b2d937a0cbeb2ae
        with:
          generate_release_notes: true
          files: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/checksums.txt
