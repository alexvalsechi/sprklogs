name: Release Desktop EXE

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-exe:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Sync desktop version with release tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            npm version "$VERSION" --no-git-tag-version --workspace @log-sparkui/desktop
          fi

      - name: Install dependencies
        run: npm ci

      - name: Fix 7zip-bin binary for electron-builder
        shell: powershell
        run: |
          $binPath = "node_modules\7zip-bin\win\x64\7za.exe"
          Write-Output "=== Diagnosing 7zip-bin ==="
          Write-Output "CWD: $(Get-Location)"
          Write-Output "7zip-bin dir exists: $(Test-Path 'node_modules\7zip-bin')"
          if (Test-Path 'node_modules\7zip-bin') {
            Get-ChildItem -Recurse 'node_modules\7zip-bin' | Select-Object FullName
          }
          Write-Output "7za.exe exists: $(Test-Path $binPath)"

          if (-not (Test-Path $binPath)) {
            Write-Output "--- 7za.exe missing, extracting from npm registry ---"
            npm pack 7zip-bin@5.2.0 2>&1
            if (-not (Test-Path '7zip-bin-5.2.0.tgz')) {
              Write-Error "npm pack failed - tgz not found"; exit 1
            }
            tar -xzf 7zip-bin-5.2.0.tgz "package/win/x64/7za.exe"
            if (-not (Test-Path 'package\win\x64\7za.exe')) {
              Write-Output "Targeted extract failed, doing full extract..."
              tar -xzf 7zip-bin-5.2.0.tgz
            }
            New-Item -ItemType Directory -Path "node_modules\7zip-bin\win\x64" -Force | Out-Null
            Copy-Item "package\win\x64\7za.exe" $binPath -Force -ErrorAction Stop
            Remove-Item 7zip-bin-5.2.0.tgz -Force -ErrorAction SilentlyContinue
            Remove-Item package -Recurse -Force -ErrorAction SilentlyContinue
          }

          if (Test-Path $binPath) {
            Write-Output "OK: 7za.exe present at $binPath ($(  (Get-Item $binPath).Length  ) bytes)"
          } else {
            Write-Error "FATAL: 7za.exe still missing at $binPath"; exit 1
          }

      - name: Build NSIS installer
        run: npm run dist:win --workspace @log-sparkui/desktop

      - name: Generate SHA256 checksums
        shell: powershell
        run: |
          $checksums = ""
          Get-ChildItem -Path apps/desktop/dist -Filter *.exe -Recurse | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            $checksums += "$($hash.Hash)  $($_.Name)`n"
          }
          Set-Content -Path apps/desktop/dist/checksums.txt -Value $checksums

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: desktop-windows-installer
          path: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/checksums.txt

      - name: Publish rolling master release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd
        with:
          tag: master-latest
          name: Desktop build (master latest)
          body: |
            Latest Windows installer generated from master/main.
          prerelease: true
          allowUpdates: true
          replacesArtifacts: true
          artifacts: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/checksums.txt

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@b25b93d384199fc0fc8c2e126b2d937a0cbeb2ae
        with:
          generate_release_notes: true
          files: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/checksums.txt
